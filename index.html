<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bimmer Garage</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Rajdhani:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style>
  :root {
    --blue: #1a6fff;
    --dark: #0a0a0f;
    --card: #111118;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px 60px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(26,111,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(26,111,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,111,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-wrap {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .logo-wrap::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: conic-gradient(from 180deg, rgba(26,111,255,0.8), transparent 40%, rgba(26,111,255,0.8) 60%, transparent);
    animation: spin 4s linear infinite;
    z-index: -1;
  }

  .logo-wrap img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 50%;
    border: 3px solid #0a0a0f;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 4px;
    line-height: 1;
    margin-bottom: 6px;
    background: linear-gradient(to right, #5bb8f5 0%, #1a6fff 40%, #ff2020 100%);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: bmwFlow 2s ease-in-out infinite alternate;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .services {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .service-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
    text-decoration: none;
    text-align: center;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .service-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(26,111,255,0.08), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .service-btn:hover {
    border-color: rgba(26,111,255,0.6);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(26,111,255,0.1);
  }

  .service-btn:hover::before { opacity: 1; }

  .service-btn .sicon { font-size: 22px; }
  .service-btn .slabel { font-size: 12px; line-height: 1.3; }
  .service-btn .sarrow { font-size: 10px; color: var(--blue); letter-spacing: 1px; opacity: 0.7; }

  /* СТИЛІ ДЛЯ БЛОКУ КАРТИ */
  .map-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s 0.2s ease both;
    overflow: hidden;
  }

  .map-container {
    width: 100%;
    height: 180px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }

  .map-container iframe {
    width: 100%;
    height: 100%;
    border: 0;
    filter: grayscale(0.3) contrast(1.1) brightness(0.9);
    transition: filter 0.3s ease;
  }
  
  .map-container:hover iframe {
    filter: grayscale(0) contrast(1) brightness(1);
  }

  .map-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
  }

  .btn-google {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-google:hover {
    background: rgba(66, 133, 244, 0.15);
    border-color: #4285f4;
    box-shadow: 0 4px 15px rgba(66, 133, 244, 0.2);
  }

  .btn-waze {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-waze:hover {
    background: rgba(49, 197, 243, 0.15);
    border-color: #31c5f3;
    box-shadow: 0 4px 15px rgba(49, 197, 243, 0.2);
  }

  .nav-icon { font-size: 16px; }

  /* СТИЛІ ДЛЯ ПОСИЛАНЬ */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 15px 18px;
    text-decoration: none;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(26,111,255,0.05), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .link-btn:hover {
    border-color: rgba(26,111,255,0.5);
    transform: translateX(4px);
    box-shadow: -4px 0 20px rgba(26,111,255,0.1);
  }

  .link-btn:hover::before { opacity: 1; }

  .link-btn:nth-child(1) { animation-delay: 0.25s; }
  .link-btn:nth-child(2) { animation-delay: 0.3s; }
  .link-btn:nth-child(3) { animation-delay: 0.35s; }
  .link-btn:nth-child(4) { animation-delay: 0.4s; }
  .link-btn:nth-child(5) { animation-delay: 0.45s; }
  .link-btn:nth-child(6) { animation-delay: 0.5s; }
  .link-btn:nth-child(7) { animation-delay: 0.55s; }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }

  .link-icon svg { width: 22px; height: 22px; }

  .icon-phone { background: rgba(52,199,89,0.15); }
  .icon-viber { background: rgba(126,76,183,0.15); }
  .icon-telegram { background: rgba(0,136,204,0.15); }
  .icon-instagram { background: rgba(225,48,108,0.15); }
  .icon-tiktok { background: rgba(255,255,255,0.08); }
  .icon-web { background: rgba(26,111,255,0.15); }

  .link-info { flex: 1; }
  .link-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .link-value { font-size: 15px; font-weight: 7
