<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bimmer Garage</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1a6fff;
    --dark: #0a0a0f;
    --card: #111118;
    --border: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px 60px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(26,111,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Grid texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(26,111,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,111,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeDown 0.6s ease both;
  }

  .logo-wrap {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid rgba(26,111,255,0.4);
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--card);
    box-shadow: 0 0 30px rgba(26,111,255,0.15), 0 0 60px rgba(26,111,255,0.05);
    overflow: hidden;
    position: relative;
  }

  .logo-wrap::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 50%;
    background: conic-gradient(from 180deg, rgba(26,111,255,0.6), transparent 40%, rgba(26,111,255,0.6) 60%, transparent);
    animation: spin 4s linear infinite;
    z-index: -1;
  }

  .logo-wrap img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    border-radius: 50%;
  }

  .logo-placeholder {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--blue);
    letter-spacing: 2px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 4px;
    color: #fff;
    line-height: 1;
    margin-bottom: 6px;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* SERVICES */
  .services {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .service-tag {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text);
    transition: border-color 0.2s, transform 0.2s;
  }

  .service-tag:hover {
    border-color: rgba(26,111,255,0.5);
    transform: translateY(-1px);
  }

  .service-tag .icon {
    font-size: 18px;
    flex-shrink: 0;
  }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* LINKS */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 28px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 15px 18px;
    text-decoration: none;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(26,111,255,0.05), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }

  .link-btn:hover {
    border-color: rgba(26,111,255,0.5);
    transform: translateX(4px);
    box-shadow: -4px 0 20px rgba(26,111,255,0.1);
  }

  .link-btn:hover::before { opacity: 1; }

  .link-btn:nth-child(1) { animation-delay: 0.2s; }
  .link-btn:nth-child(2) { animation-delay: 0.25s; }
  .link-btn:nth-child(3) { animation-delay: 0.3s; }
  .link-btn:nth-child(4) { animation-delay: 0.35s; }
  .link-btn:nth-child(5) { animation-delay: 0.4s; }
  .link-btn:nth-child(6) { animation-delay: 0.45s; }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }

  .link-icon svg {
    width: 22px;
    height: 22px;
  }

  .icon-phone { background: rgba(52,199,89,0.15); }
  .icon-viber { background: rgba(126,76,183,0.15); }
  .icon-telegram { background: rgba(0,136,204,0.15); }
  .icon-instagram { background: rgba(225,48,108,0.15); }
  .icon-tiktok { background: rgba(255,255,255,0.08); }
  .icon-web { background: rgba(26,111,255,0.15); }

  .link-info { flex: 1; }
  .link-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .link-value { font-size: 15px; font-weight: 700; }

  .link-arrow {
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.2s, color 0.2s;
  }
  .link-btn:hover .link-arrow {
    transform: translateX(3px);
    color: var(--blue);
  }

  /* CITY */
  .city-badge {
    text-align: center;
    margin-top: 8px;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  .city-badge span {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  /* ANIMATIONS */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
</head>
